services:
  - type: web
    name: amigo-enterprises-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
        # e.g. https://amigo-enterprises-frontend.vercel.app (comma-separate preview URLs if needed)
